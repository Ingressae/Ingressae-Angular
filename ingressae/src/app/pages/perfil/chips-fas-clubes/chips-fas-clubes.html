<div class="card-dark p-4 mb-4 rounded-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="text-white fw-semibold mb-0">
            ⭐ Fã Clubes
        </h6>
        <span class="text-secondary small">{{ fasClubes.length }}/5</span>
    </div>

    <div class="d-flex flex-wrap gap-2">

        <span *ngFor="let fasClube of nomesFasClubes" class="chip-fas-clube">
            {{ fasClube }}
        </span>

        <button class="chip-adicionar" [disabled]="limiteAtingido"
            [title]="limiteAtingido ? 'Limite de 5 fã clubes atingido' : 'Adicionar fã clube'"
            [routerLink]="limiteAtingido ? null : '/fas-clubes'">
            + Adicionar Fã Clube
        </button>

    </div>

</div>
