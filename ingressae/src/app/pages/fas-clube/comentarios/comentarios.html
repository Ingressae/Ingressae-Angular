<div class="card bg-dark border-secondary rounded-4 shadow-sm p-3">

  <div class="card-body p-0">

    <div class="d-flex align-items-center gap-3 mb-3">

      <div class="rounded-circle d-flex justify-content-center align-items-center fw-bold text-white flex-shrink-0"
        style="
          width: 46px;
          height: 46px;

          background: linear-gradient(
            135deg,
            #8b5cf6,
            #14b8ff
          );
        ">

        {{comentario.nomeAutor.slice(0,2)}}

      </div>

      <div>

        <h6 class="text-white fw-bold mb-0">
          {{comentario.nomeAutor}}
        </h6>

        <small class="text-secondary">
          {{comentario.criadoEm | date:'dd-MM-yyy HH:mm'}}
        </small>

      </div>

    </div>
    <div class="d-flex justify-content-between align-items-end">
      <p class="text-light mb-0 px-3" style="
        font-size: 1.1rem;
        line-height: 1.6;
       " [innerHTML]="comentario.conteudo | markdown">
      </p>
      <button class="btn btn-success rounded-pill" (click)="comentario.qtdlike = comentario.qtdlike + 1">
        {{comentario.qtdlike}} <i class="bi bi-hand-thumbs-up-fill"></i>
      </button>
    </div>
  </div>

</div>
