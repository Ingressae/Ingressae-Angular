<div class="card bg-dark border-secondary rounded-5 overflow-hidden shadow-lg text-white">
  <!-- BANNER (GRADIENTE) -->
  <div class="position-relative banner-capa" [style.background]="clube?.bannerGradient || 'linear-gradient(135deg, #1a1d21, #2b2f35)'">
    <div class="banner-capa-overlay"></div>
  </div>

  <!-- CONTEÚDO -->
  <div class="card-body px-5 py-4">

    <!-- FOTO PERFIL -->
    <div class="rounded-4 overflow-hidden border border-5 border-dark shadow ms-5" style="
          width: 100px;
          height: 100px;
          margin-top: -75px;
          position: relative;
          z-index: 10;
          background: #2b2f35;
        ">

      @if (obterImagemClube()) {
        <img [src]="obterImagemClube()" class="w-100 h-100 object-fit-cover" [alt]="clube?.nomeArtista">
      } @else {
        <div class="w-100 h-100 d-flex align-items-center justify-content-center bg-secondary">
          <i class="bi bi-person-fill fs-1"></i>
        </div>
      }

    </div>

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-4 mt-3">

      <!-- INFO -->
      <div class="ms-5">

        <h3 class="fw-bold mb-2">
          {{clube?.nome}}
        </h3>

        <p class="text-secondary fs-6 mb-2">
          {{clube?.nomeArtista}}
        </p>

        <div class="d-flex align-items-center gap-2 text-secondary">

          <i class="bi bi-people"></i>

          <span>
            {{clube?.totalMembros}}
          </span>

        </div>

      </div>

      <!-- BADGE -->
      <div>

        @if(isMembro) {

        <button (click)="curtirClube()" class="btn btn-danger rounded-5 fs-6 fw-semibold ">

          <i class="bi bi-box-arrow-right me-2"></i>
          Sair do clube

        </button>
        }@else{


        <button (click)="curtirClube()" class="btn btn-primary rounded-5 fs-6 fw-semibold ">

          Vire membro

        </button>

        }
      </div>

    </div>

  </div>
</div>
