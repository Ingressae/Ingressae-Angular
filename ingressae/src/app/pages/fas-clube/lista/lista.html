<div class="inicio-container">
  <!-- Cabeçalho (Hero) -->
  <div class="hero">
    <div class="hero-badge">
      <i class="bi bi-stars icon-sparkle"></i>
      <span>Encontre sua comunidade</span>
    </div>
    <h1 class="hero-title">Encontre seu <span class="highlight">fã clube</span></h1>
    <p class="hero-subtitle">Conecte-se com outros fãs e tenha acesso a benefícios exclusivos nos seus shows favoritos.</p>
  </div>

  <!-- Barra de Busca -->
  <div class="search-container mb-5">
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input 
        type="text" 
        [(ngModel)]="termoBusca" 
        placeholder="Buscar fã clube por nome ou artista..."
        class="search-input"
      >
    </div>
    
    <!-- Indicador de Limite (0/6) -->
    <div class="limit-indicator mt-3" *ngIf="usuarioAtual()">
      <div class="d-flex justify-content-between mb-1">
        <span class="limit-label">Seus Clubes</span>
        <span class="limit-value text-white">{{ quantidadeInscricoes() }}/6</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" [style.width.%]="(quantidadeInscricoes() / 6) * 100"></div>
      </div>
    </div>
  </div>

  <!-- Grid de Cards -->
  <div class="shows-grid" *ngIf="temResultados()">
    <!-- AQUI ESTÁ A CHAVE: Passamos o limiteAtingido() para cada card -->
    <app-card-postagem 
      *ngFor="let clube of fasClubesFiltrados()" 
      [clube]="clube"
      [isMembro]="isMembro(clube.id)"
      [limiteAtingido]="atingiuLimiteInscricoes()"
      (entrar)="entrarClube($event)"
      (ver)="verClube($event)"
    ></app-card-postagem>
  </div>

  
</div>
