<div class="card">
  <div class="card-gradient" [ngClass]="show.gradientClass"></div>
  
  <div class="card-content">
    <span class="badge-show">SHOW</span>
    
    <h3 class="title">{{ show.title }}</h3>
    
    <div class="info-row">
      <i class="icon-calendar">📅</i> 
      <span>{{ show.date }}</span>
    </div>
    
    <div class="info-row">
      <i class="icon-location">📍</i> 
      <span>{{ show.location }}</span>
    </div>

    <div class="action-buttons">
      <button class="btn-outline"><i class="icon-search">🔍</i> Saiba Mais</button>
      <button class="btn-outline"><i class="icon-star">⭐</i> Fã Clube</button>
    </div>

    <div class="divider"></div>

    <div class="queue-section">
      <span class="queue-label">ENTRAR NA FILA</span>
      
      <button class="btn-queue btn-pref">
        <span class="queue-name"><i class="icon-crown">👑</i> Fila Preferencial</span>
        <span class="badge-status">Disponível</span>
      </button>

      <button class="btn-queue btn-normal">
        <span class="queue-name"><i class="icon-ticket">🎟️</i> Fila Normal</span>
        <span class="badge-status">Disponível</span>
      </button>
    </div>
  </div>
</div>
