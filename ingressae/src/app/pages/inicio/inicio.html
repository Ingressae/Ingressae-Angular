<main class="inicio-container">

  <section class="hero">
    <div class="hero-badge">
      <i class="bi bi-stars icon-sparkle"></i> Fila justa, ingressos garantidos
    </div>

    <h1 class="hero-title">
      Os melhores shows <br><span class="highlight">sem stress</span>
    </h1>

    <p class="hero-subtitle">
      Entre na fila preferencial ou normal e acompanhe sua posição em tempo real.
    </p>
  </section>

  <!-- Barra de Busca -->
  <div class="search-container mb-5">
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="text" [(ngModel)]="termoBusca" placeholder="Buscar evento por nome ou artista..."
        class="search-input">
      <button
        *ngIf="temFiltrosAtivos()"
        class="btn-limpar-filtros"
        (click)="limparFiltros()"
        title="Limpar filtros">
        <i class="bi bi-x-circle"></i>
      </button>
    </div>

    <!-- Filtros em Dropdowns -->
    <div class="filtros-dropdowns mt-4">
      <!-- Localização -->
      <div class="filtro-wrapper">
        <i class="bi bi-geo-alt-fill"></i>
        <select [(ngModel)]="filtroLocalizacao" class="select-filtro">
          <option value="">Localização</option>
          <option *ngFor="let estado of estados()" [value]="estado">{{ estado }}</option>
        </select>
      </div>

      <!-- Gênero -->
      <div class="filtro-wrapper">
        <i class="bi bi-music-note-beamed"></i>
        <select [(ngModel)]="filtroGenero" class="select-filtro">
          <option value="">Gênero</option>
          <option *ngFor="let genero of generos()" [value]="genero">{{ genero }}</option>
        </select>
      </div>

      <!-- Período (Mês/Ano) -->
      <div class="filtro-wrapper">
        <i class="bi bi-calendar-event"></i>
        <select [(ngModel)]="filtroMes" class="select-filtro">
          <option value="">Período</option>
          <option *ngFor="let mes of mesesDisponiveis()" [value]="mes">{{ mes }}</option>
        </select>
      </div>
    </div>

    <!-- Estado Vazio -->
    <app-estado-vazio *ngIf="!carregando() && !temResultados()"></app-estado-vazio>

    <br>

  </div>

  <section class="shows-grid" *ngIf="!carregando()">

    <app-card-show *ngFor="let show of showsFiltrados()" [show]="show">
    </app-card-show>

  </section>

</main>
