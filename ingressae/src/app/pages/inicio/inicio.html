<main class="inicio-container">

  <section class="hero">
    <div class="hero-badge">
      <i class="bi bi-stars icon-sparkle"></i> Fila justa, ingressos garantidos
    </div>

    <h1 class="hero-title">
      Os melhores shows <br><span class="highlight">sem stress</span>
    </h1>

    <p class="hero-subtitle">
      Entre na fila preferencial ou normal e acompanhe sua posição em tempo real.
    </p>
  </section>

  <!-- Componente de Filtros -->
  <app-filtros [shows]="shows()" (filtrosChange)="onFiltrosChange($event)"></app-filtros>

  <!-- Estado Vazio -->
  <div class="search-container mb-5">
    <app-estado-vazio *ngIf="!carregando() && !temResultados()"></app-estado-vazio>
  </div>

<section class="shows-grid" *ngIf="!carregando()">
    <app-card-show 
      *ngFor="let show of showsFiltrados()" 
      [show]="show"
      (abrirModal)="onAbrirModal($event)">
    </app-card-show>
  </section>

</main> <app-saiba-mais 
  *ngIf="showSelecionado() as showSel" 
  [show]="showSel" 
  (fechar)="onFecharModal()">
</app-saiba-mais>
