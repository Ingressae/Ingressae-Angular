<main class="inicio-container">

  <section class="hero">
    <div class="hero-badge">
      <i class="bi bi-stars icon-sparkle"></i> Fila justa, ingressos garantidos
    </div>

    <h1 class="hero-title">
      Os melhores shows <br><span class="highlight">sem stress</span>
    </h1>

    <p class="hero-subtitle">
      Entre na fila preferencial ou normal e acompanhe sua posição em tempo real.
    </p>
  </section>

  <!-- Barra de Busca -->
  <div class="search-container mb-5">
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="text" [(ngModel)]="termoBusca" placeholder="Buscar evento por nome ou artista..."
        class="search-input">
    </div>

    <!-- Filtros e Ordenação -->
    <div class="filtros-container mt-4">
      <!-- Chips de Filtro por Data -->
      <div class="filter-group">
        <label class="filter-label">Quando:</label>
        <div class="chips-container">
          <button
            class="chip"
            [class.active]="filtroData() === 'todos'"
            (click)="filtroData.set('todos')">
            Todos
          </button>
          <button
            class="chip"
            [class.active]="filtroData() === 'semana'"
            (click)="filtroData.set('semana')">
            Esta semana
          </button>
          <button
            class="chip"
            [class.active]="filtroData() === 'mes'"
            (click)="filtroData.set('mes')">
            Este mês
          </button>
          <button
            class="chip"
            [class.active]="filtroData() === 'tres-meses'"
            (click)="filtroData.set('tres-meses')">
            Próximos 3 meses
          </button>
        </div>
      </div>

      <!-- Dropdown de Ordenação -->
      <div class="filter-group">
        <label class="filter-label">Ordenar por:</label>
        <select [(ngModel)]="ordenacao" class="select-ordenacao">
          <option value="data">Data</option>
          <option value="nome">Nome</option>
        </select>
      </div>
    </div>

    <!-- Estado Vazio -->
    <app-estado-vazio *ngIf="!carregando() && !temResultados()"></app-estado-vazio>

    <br>

  </div>

  <section class="shows-grid" *ngIf="!carregando()">

    <app-card-show *ngFor="let show of showsFiltrados()" [show]="show">
    </app-card-show>

  </section>

</main>
