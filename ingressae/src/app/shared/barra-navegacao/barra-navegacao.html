<nav class="navbar">

  <a
    routerLink="/inicio"
    class="logo">

    <img
      src="assets/images/nome_sem_fundo.png"
      alt="Ingressaê"
      class="logo-image"
    />

  </a>

  <button
    class="hamburger"
    (click)="toggleMobileMenu()">

    ☰

  </button>

  <div
    class="nav-links"
    [class.mobile-open]="mobileMenuAberto">

    <a
      routerLink="/inicio"
      routerLinkActive="active"
      class="nav-item">
      Shows
    </a>

    <a
      routerLink="/fas-clubes"
      routerLinkActive="active"
      class="nav-item">
      Fã Clubes
    </a>

  </div>

  <div
    class="user-area"
    [class.mobile-open]="mobileMenuAberto"
    (click)="toggleMenu()">

    <app-avatar
      [iniciais]="'MS'">
    </app-avatar>

    <span class="arrow">
      ▼
    </span>

    @if (menuAberto) {

      <div class="dropdown">

        <a
          routerLink="/perfil"
          class="dropdown-item"
          (click)="fecharMenu()">
          Perfil
        </a>

        <button
          class="dropdown-item logout-button"
          (click)="logout()">
          Sair
        </button>

      </div>

    }

  </div>

</nav>
